agent:
  id: "agentxyz"
  team: "ctp"
  runtime: aks
  interaction_model: "standalone"
  guardrail_profile: "strict"

identity:
  sp_client_id: "8fdef940-d623-4c04-98f2-257e4d3db545"
  keyvault_url: "https://kv-shop-poc.vault.azure.net/"

tools: []
  - id: toloooo-api
    roles:
      - toloooo-api.read
      - toloooo-api.write
    apim_base_url: https://apim-shop-poc.azure-api.net/tools/toloooo-api

evaluation:
  suite: default-strict
  ci_gate: true
  pass_threshold: 0.95
  datasets:
    - id: golden-dataset
      version: v1.0
      source: repo
      path: evals/datasets/golden-dataset.json

output_policy:
  violation_threshold: 5
  window_minutes: 1
  action: block
  notify_webhook: 

prompts:
  active_version: v1.0
  source: prompts/system.txt
