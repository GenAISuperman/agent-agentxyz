apiVersion: apps/v1
kind: Deployment
metadata:
  name: "agentxyz"
  namespace: "agents-ctp"
  labels:
    app: "agentxyz"
    team: "ctp"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "agentxyz"
  template:
    metadata:
      labels:
        app: "agentxyz"
        team: "ctp"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-agentxyz"
      containers:
        - name: "agentxyz"
          image: "acrshoppoc.azurecr.io/agents/agentxyz:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-agentxyz"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
